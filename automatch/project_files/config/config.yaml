# automatch: system internals (models, weights, scraper plumbing).
# Job targeting lives in profile.yaml, which overrides the matching
# fields below.

scrape:
  sites: [indeed, linkedin]
  search_terms:                # fallback defaults; profile.yaml overrides
    - "Financial Analyst"
  location: "New York, NY"
  radius_miles: 20
  hours_old: 72                # widen for testing, tighten for daily use
  max_jobs: 250                # new-jobs-per-run cap (CLI -r overrides per-term)
  linkedin_fetch_description: true
  request_delay_seconds: 3
  country_indeed: "USA"

score:
  cosine_weight: 1.0           # how much the resume<->description embedding match
                               # counts. note: cosine spans ~0.55-0.80 in practice
                               # (narrower than your 0-1 vectors), so raise this if
                               # you want resume-match to steer the ranking harder
  threshold: 0.0               # drop matches scoring below this (0 = keep all)
  top_n: 25                    # how many rows in matches.html
  # Experience-level preference (judge classifies every job as
  # entry / mid / senior / executive). Applied at RANK time; change these
  # and re-run `rank-only` for instant re-ranking, no model calls.
  #
  # HARD mode: uncomment level_filter to keep ONLY these levels and drop
  # everything else entirely:
  # level_filter: [entry, mid]
  #
  # SOFT mode (default when level_filter is unset): reward reachable levels,
  # punish out-of-reach ones; nothing is excluded, just re-ranked:
  level_adjust:
    entry: 0.1
    mid: 0.1
    senior: 0.0
    executive: -0.3

models:                        # served by ollama; OLLAMA_HOST env var overrides host
  host: "http://localhost:11434"
  embed: "nomic-embed-text"
  # judge options (tier, approx VRAM):
  #   llama3.1:8b  = light    (CPU-only or ~6GB VRAM)
  #   mistral-nemo = balanced (~8GB VRAM)
  #   qwen2.5:14b  = sharp    (~12GB VRAM)
  #   qwen2.5:32b  = max      (24GB+ VRAM)
  # Switching via `python3 edit.py` (scoring settings) or the bot `!model 1-4`
  # downloads the chosen model first. Hand-editing this line does NOT download:
  # if the model is not pulled, scoring fails per job with an
  # `ollama pull <model>` hint, so run `ollama pull <model>` first.
  judge: "mistral-nemo"
