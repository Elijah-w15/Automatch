# ====================================================================
#  automatch system config: models, weights, and scraper plumbing.
#  Your actual job search lives in profile.yaml -- the search fields
#  here are only fallbacks, so most people never touch this file.
# ====================================================================


# ---- scraper -------------------------------------------------------
# search_terms / location / radius_miles / hours_old / max_jobs are
# FALLBACKS only: set them in profile.yaml, which overrides these.
scrape:
  sites:        [indeed, linkedin]
  search_terms: ["Financial Analyst"]    # fallback -> profile.yaml wins
  location:     "New York, NY"           # fallback -> profile.yaml wins
  radius_miles: 20                       # fallback -> profile.yaml wins
  hours_old:    72                       # fallback -> profile.yaml wins
  max_jobs:     250                      # fallback -> profile.yaml wins

  linkedin_fetch_description: true       # full text: slower, better match
  request_delay_seconds:      3          # pause between requests
  country_indeed:             "USA"      # Indeed region


# ---- scoring -------------------------------------------------------
score:
  cosine_weight: 1.0     # resume<->job text-match weight (see note)
  threshold:     0.0     # hide jobs below this score (0 = keep all)
  top_n:         25      # number of rows in matches.html

  # cosine note: the resume<->description match runs ~0.55-0.80 in
  # practice, narrower than your 0-1 metrics -- raise cosine_weight to
  # let resume match steer the ranking harder.

  # ---- experience level: chosen by  level:  in profile.yaml --------
  #   default   nudge scores by level (modifiers below); drop nothing
  #   entry     keep ONLY entry-level jobs   (profile.yaml: level: entry)
  #   senior    keep ONLY senior jobs        (profile.yaml: level: senior)
  #
  # DEFAULT-mode modifiers, tune freely: added to each job's score by
  # its level (+ rewards, - buries). Applied at rank time, so edits
  # re-rank instantly with no AI calls.
  level_adjust:
    entry:      0.1      # + favor entry roles
    mid:        0.1      # + favor mid roles
    senior:     0.0      #   neutral
    executive: -0.3      # - bury roles above your level

  # entry / senior modes set this filter automatically from profile.yaml.
  # Uncomment to force specific levels by hand instead:
  # level_filter: [entry, mid]


# ---- AI models (served by ollama) ----------------------------------
models:
  host:  "http://localhost:11434"   # OLLAMA_HOST env var overrides this
  embed: "nomic-embed-text"         # embeddings for resume<->job match
  judge: "mistral-nemo"             # scores each job against your rubric


# ---- file locations (optional overrides) ---------------------------
# Defaults sit next to the program: ./output for results, and your
# resume + stripped match-resume in ./config. Override any of them here.
# Precedence for each:  env var  >  this paths: block  >  default
#   output_dir    ->  AUTOMATCH_OUTPUT        (results: matches.html, ...)
#   resume        ->  AUTOMATCH_RESUME        (config/resume.txt)
#   resume_embed  ->  AUTOMATCH_RESUME_EMBED  (config/resume_embed.txt, the
#                                              OPTIONAL stripped match-resume)
# (The config dir itself can't be set here -- we'd have to read this file
# to find it; use AUTOMATCH_CONFIG for that.) Inside Docker ./output and
# ./config are mounted volumes, so custom paths mainly apply when running
# outside the container. Use absolute paths.
# paths:
#   output_dir:   /absolute/path/to/output
#   resume:       /absolute/path/to/resume.txt
#   resume_embed: /absolute/path/to/resume_embed.txt
