# Compose config defining the automatch services, volumes, and run-time options.
name: automatch        # pin the project name so images/containers are
                       # "automatch-*" regardless of the folder it runs from
services:
  automatch:
    build:
      context: .                   # build the image from ./Dockerfile
      target: base                 # basic stage: no discord, stays lean
    # run as the host user so output files are owned by that user, not root.
    # UID/GID default to 1000 (the typical first Linux user) when unset.
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      HOME: /tmp                   # some libs want a writable $HOME
    volumes:
      # mount host config and output dirs into the container so data persists
      # on disk while the container stays disposable.
      - ./config:/app/config
      - ./output:/app/output
    extra_hosts:
      # map host.docker.internal to the host gateway so the container can reach
      # ollama running on the host (not provided by default on Linux).
      - "host.docker.internal:host-gateway"
    # load secrets at run time as environment variables from .env (gitignored
    # and dockerignored) instead of baking them into the image. .env.example is
    # the committed template showing the expected shape.
    env_file:
      - path: .env
        required: false        # fresh clones run without one; cp .env.example .env to use it

  # Optional Discord bot, gated behind the "advanced" profile so it is not
  # built or run by default. Start it with:
  #   docker compose --profile advanced run --rm bot
  bot:
    build:
      context: .
      target: advanced           # base + discord.py
    profiles: ["advanced"]
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      HOME: /tmp
    volumes:
      - ./config:/app/config
      - ./output:/app/output
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env
        required: false        # holds DISCORD_BOT_TOKEN etc.; written by setup.py
    command: ["bot"]
