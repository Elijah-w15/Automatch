services:
  automatch:
    build:
      context: .
      target: base                 # basic stage: no discord, stays lean
    # Write output as the host user, not root, so non-Docker runs and a plain
    # `rm` on the results still work ($UID falls back to 1000, the default
    # first user on a single-user Linux box).
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      HOME: /tmp                   # some libs need a writable $HOME
    volumes:
      # config and results live on the host; the container stays disposable.
      - ./config:/app/config
      - ./output:/app/output
    extra_hosts:
      # Map host.docker.internal to the host gateway so the container can reach
      # ollama on the host (Linux doesn't provide this name by default).
      - "host.docker.internal:host-gateway"
    env_file:
      # Secrets enter at runtime, never baked into the image. Optional so a
      # fresh clone runs without one; .env.example is the committed template.
      - path: .env
        required: false

  # Optional ATS Discord bot, behind a compose profile so basic users never
  # build or see it:  docker compose --profile advanced run --rm bot
  bot:
    build:
      context: .
      target: advanced             # base + discord.py
    profiles: ["advanced"]
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      HOME: /tmp
    volumes:
      - ./config:/app/config
      - ./output:/app/output
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - path: .env
        required: false            # holds DISCORD_BOT_TOKEN etc.; written by setup.py
    command: ["bot"]
